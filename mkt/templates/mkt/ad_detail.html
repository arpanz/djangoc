{% extends "base_menu.html" %}
{% load humanize %}
{% block content %}
<span style="float: right;">
({{ ad.updated_at|naturaltime }})
{% if ad.owner == user %}
<a href="{% url 'mkt:ad_update' ad.id %}"><i class="fa fa-pencil"></i></a>
<a href="{% url 'mkt:ad_delete' ad.id %}"><i class="fa fa-trash"></i></a>
{% endif %}
</span>
<h1>{{ ad.title }}</h1>
{% if ad.price %}<p><b>Price: ${{ ad.price }}</b></p>
{% else %}<p><b>Price:</b> (not set)</p>{% endif %}
<p>{{ ad.text }}</p>
<p><a href="{% url 'mkt:all' %}">All Ads</a></p>
{% endblock %}
